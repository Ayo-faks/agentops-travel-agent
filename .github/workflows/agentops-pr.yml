# AgentOps - PR evaluation gate (Foundry prompt agent)
#
# agentops:deploy-mode=prompt-agent
#
# For Foundry prompt-agent flows, the PR gate must evaluate the prompt
# the PR is proposing, not the seed agent version pinned in
# `agentops.yaml`. So this PR workflow stages an ephemeral candidate
# Foundry prompt-agent version in the sandbox project from the
# source-controlled `prompt_file`, evaluates that exact candidate, and
# runs Doctor against it. The merge gate is the eval + Doctor result.
#
# Notes:
#   - Each PR run creates or reuses a candidate version in the sandbox
#     Foundry project. AgentOps deduplicates only when the prompt is
#     byte-identical to the current seed version's instructions.
#     Candidate versions are tagged with `agentops:candidate=true` and
#     `agentops:pr=<number>` so portal viewers can filter them out and
#     consumers that resolve "latest" can refuse to pick them up.
#   - Merge is what promotes the candidate via the deploy workflow.
#     This PR workflow does not record the candidate as deployed.
#
# Generated by `agentops workflow generate --deploy-mode prompt-agent`.

name: AgentOps PR

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      config:
        description: "Path to agentops.yaml (defaults to ./agentops.yaml at repo root)"
        required: false
        default: "agentops.yaml"

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: agentops-pr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stage-candidate:
    name: Stage Foundry prompt candidate (PR)
    runs-on: ubuntu-latest
    # Stage PR candidates in the sandbox Foundry project (the author's
    # playground). The dev deploy workflow promotes to the dev project
    # on merge to main.
    environment: sandbox
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install AgentOps Toolkit
        run: |
          uv pip install --system "agentops-accelerator[foundry,agent]==0.5.2"

      - name: Create candidate agent version from prompt_file
        env:
          AZURE_AI_FOUNDRY_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_FOUNDRY_PROJECT_ENDPOINT }}
          AGENTOPS_AGENT_PROMPT_FILE: ${{ vars.AGENTOPS_AGENT_PROMPT_FILE || '' }}
        run: |
          python -m agentops.pipeline.prompt_deploy stage \
            --config "${{ inputs.config || 'agentops.yaml' }}" \
            --environment "sandbox" \
            --out ".agentops/deployments/foundry-agent.json" \
            --eval-config ".agentops/deployments/agentops.candidate.yaml"

      - name: Upload candidate deployment record
        uses: actions/upload-artifact@v7
        with:
          name: foundry-agent-pr-candidate
          path: |
            .agentops/deployments/foundry-agent.json
            .agentops/deployments/agentops.candidate.yaml
          if-no-files-found: error

  eval:
    name: AgentOps eval (PR gate)
    needs: stage-candidate
    runs-on: ubuntu-latest
    environment: sandbox
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download candidate deployment record
        uses: actions/download-artifact@v7
        with:
          name: foundry-agent-pr-candidate
          path: .agentops/deployments

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Install AgentOps Toolkit
        run: |
          uv pip install --system "agentops-accelerator[foundry,agent]==0.5.2"

      - name: Set up Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Install pinned azd AI agents extension
        env:
          AGENTOPS_AZD_AI_AGENTS_EXTENSION_VERSION: "0.1.41-preview"
        run: |
          azd extension install azure.ai.agents --version "$AGENTOPS_AZD_AI_AGENTS_EXTENSION_VERSION"

      - name: Normalize candidate + recipe paths (agentops 0.5.2 staging workaround)
        run: |
          python - <<'PY'
          import os, yaml

          def absify(v):
              if isinstance(v, str) and v and not os.path.isabs(v):
                  return os.path.abspath(v)
              return v

          cand_path = ".agentops/deployments/agentops.candidate.yaml"
          cand = yaml.safe_load(open(cand_path))
          for k in ("eval_recipe", "prompt_file", "assert_path", "redteam_path"):
              if k in cand:
                  cand[k] = absify(cand[k])
          if isinstance(cand.get("assert"), dict) and "config" in cand["assert"]:
              cand["assert"]["config"] = absify(cand["assert"]["config"])
          yaml.safe_dump(cand, open(cand_path, "w"), sort_keys=False)
          print("normalized eval_recipe =", cand.get("eval_recipe"))

          recipe_path = cand.get("eval_recipe") or "src/travel-agent/eval.yaml"
          recipe = yaml.safe_load(open(recipe_path))
          ds = recipe.get("dataset")
          if isinstance(ds, dict) and ds.get("local_uri"):
              uri = ds["local_uri"]
              if not os.path.exists(uri):
                  repaired = os.path.abspath(os.path.join(".agentops/azd", os.path.basename(uri)))
                  if os.path.exists(repaired):
                      ds["local_uri"] = repaired
                      yaml.safe_dump(recipe, open(recipe_path, "w"), sort_keys=False)
                      print("repaired dataset.local_uri =", repaired)
                  else:
                      print("WARNING: dataset missing at", uri, "and", repaired)
              else:
                  print("dataset.local_uri OK =", uri)
          PY

      - name: Hydrate azd environment for Foundry project context
        env:
          AZURE_ENV_NAME: "sandbox"
          AZURE_AI_FOUNDRY_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_FOUNDRY_PROJECT_ENDPOINT }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
        run: |
          set -euo pipefail
          azd env select "$AZURE_ENV_NAME" 2>/dev/null || azd env new "$AZURE_ENV_NAME" --no-prompt
          azd env set FOUNDRY_PROJECT_ENDPOINT "$AZURE_AI_FOUNDRY_PROJECT_ENDPOINT"
          azd env set AZURE_AI_FOUNDRY_PROJECT_ENDPOINT "$AZURE_AI_FOUNDRY_PROJECT_ENDPOINT"
          azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"
          if [ -n "${AZURE_OPENAI_ENDPOINT:-}" ]; then
            azd env set AZURE_OPENAI_ENDPOINT "$AZURE_OPENAI_ENDPOINT"
          fi
          echo "Hydrated azd env '$AZURE_ENV_NAME':"
          azd env get-values | sed -E 's/=.*/=<set>/'

      - name: Run azd AI agent eval through AgentOps
        id: eval
        env:
          AZURE_AI_FOUNDRY_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_FOUNDRY_PROJECT_ENDPOINT }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_MODEL_NAME: ${{ vars.AZURE_OPENAI_MODEL_NAME }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING || vars.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          set +e
          agentops eval run --config ".agentops/deployments/agentops.candidate.yaml" --output ".agentops/results/latest"
          ec=$?
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          if [ $ec -eq 0 ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          elif [ $ec -eq 2 ]; then
            echo "result=threshold_failed" >> "$GITHUB_OUTPUT"
          else
            echo "result=error" >> "$GITHUB_OUTPUT"
          fi
          exit $ec

      - name: Detect AgentOps governance gates
        id: governance
        env:
          AGENTOPS_CONFIG: ".agentops/deployments/agentops.candidate.yaml"
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          from agentops.utils.yaml import load_yaml

          config = Path(os.environ["AGENTOPS_CONFIG"])
          data = load_yaml(config) if config.exists() else {}
          has_assert = isinstance(data, dict) and "assert" in data
          has_redteam = isinstance(data, dict) and "redteam" in data
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as env_file:
              env_file.write(f"AGENTOPS_HAS_ASSERT={str(has_assert).lower()}\n")
              env_file.write(f"AGENTOPS_HAS_REDTEAM={str(has_redteam).lower()}\n")
          print(f"ASSERT gate: {has_assert}")
          print(f"Red Team gate: {has_redteam}")
          PY

      - name: Install AgentOps governance dependencies
        if: env.AGENTOPS_HAS_ASSERT == 'true' || env.AGENTOPS_HAS_REDTEAM == 'true'
        run: |
          if [ "$AGENTOPS_HAS_ASSERT" = "true" ]; then
            uv pip install --system assert-ai
          fi
          if [ "$AGENTOPS_HAS_REDTEAM" = "true" ]; then
            uv pip install --system "azure-ai-evaluation[redteam]"
          fi

      - name: Run ASSERT gate
        if: env.AGENTOPS_HAS_ASSERT == 'true'
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE: ${{ vars.AZURE_API_BASE }}
          AZURE_API_VERSION: ${{ vars.AZURE_API_VERSION }}
        run: |
          agentops assert run --config ".agentops/deployments/agentops.candidate.yaml"

      - name: Run Red Team gate
        if: env.AGENTOPS_HAS_REDTEAM == 'true'
        env:
          AZURE_AI_FOUNDRY_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_FOUNDRY_PROJECT_ENDPOINT }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_MODEL_NAME: ${{ vars.AZURE_OPENAI_MODEL_NAME }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING || vars.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          agentops redteam run --config ".agentops/deployments/agentops.candidate.yaml"


      - name: Generate release evidence
        if: always()
        env:
          AZURE_AI_FOUNDRY_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_FOUNDRY_PROJECT_ENDPOINT }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING || vars.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          # Doctor gate severity is configured at workflow generation time via
          # `agentops workflow generate --doctor-gate critical|warning|none`.
          agentops doctor --workspace . --out .agentops/agent/report.md \
            --severity-fail critical --evidence-pack

      - name: Upload AgentOps results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agentops-pr-results
          path: |
            .agentops/results/latest/results.json
            .agentops/results/latest/report.md
            .agentops/results/latest/azd_evaluation.json
            .agentops/results/latest/azd_stdout.log
            .agentops/results/latest/azd_stderr.log
            .agentops/assert/latest.json
            .agentops/redteam/latest.json
            .agentops/redteam/raw_summary.json
            .agentops/agent/report.md
            .agentops/release/latest/evidence.json
            .agentops/release/latest/evidence.md
          if-no-files-found: warn

      - name: Step summary
        if: always()
        run: |
          {
            echo "## AgentOps PR Eval (Foundry prompt candidate)"
            echo
            echo "Result: \`${{ steps.eval.outputs.result }}\` (exit code \`${{ steps.eval.outputs.exit_code }}\`)"
            echo
            if [ -f .agentops/results/latest/report.md ]; then
              cat .agentops/results/latest/report.md
            fi
            if [ -f .agentops/release/latest/evidence.md ]; then
              echo
              echo "---"
              echo
              cat .agentops/release/latest/evidence.md
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment AgentOps report on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = '.agentops/results/latest/report.md';
            const marker = '<!-- agentops-pr-report -->';
            let body = `${marker}\n## AgentOps PR Eval (Foundry prompt candidate)\n\nNo report produced.`;
            if (fs.existsSync(path)) {
              const md = fs.readFileSync(path, 'utf8');
              body = `${marker}\n${md}`;
            }
            const evidencePath = '.agentops/release/latest/evidence.md';
            if (fs.existsSync(evidencePath)) {
              const evidence = fs.readFileSync(evidencePath, 'utf8');
              body = `${body}\n\n---\n\n${evidence}`;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
